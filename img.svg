<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1">
        <animate attributeName="stop-color" values="#667eea; #764ba2; #6ee7f9; #667eea" dur="10s"
          repeatCount="indefinite" />
      </stop>
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1">
        <animate attributeName="stop-color" values="#764ba2; #6ee7f9; #667eea; #764ba2" dur="10s"
          repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#6ee7f9;stop-opacity:1">
        <animate attributeName="stop-color" values="#6ee7f9; #667eea; #764ba2; #6ee7f9" dur="10s"
          repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="20" fill="url(#grad)" />

  <text x="50%" y="50%" text-anchor="middle" fill="white" font-size="48"
    font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="700" letter-spacing="-1"
    filter="url(#shadow)" dy=".3em" opacity="0">
    Welcome to My GitHub Profile
    <animate attributeName="opacity" from="0" to="1" dur="2s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="2s" fill="freeze" />
  </text>
</svg>